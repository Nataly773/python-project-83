<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Информация об URL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1>Информация об URL</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <table class="table" data-test="url">
        <tbody>
            <tr><th>ID</th><td>{{ url.id }}</td></tr>
            <tr><th>URL</th><td>{{ url.name }}</td></tr>
            <tr><th>Дата создания</th><td>{{ url.created_at }}</td></tr>
        </tbody>
    </table>

    <a href="{{ url_for('index') }}" class="btn btn-secondary">Добавить ещё</a>
    <a href="{{ url_for('list_urls') }}" class="btn btn-primary">Список всех URL</a>
</body>
</html>
